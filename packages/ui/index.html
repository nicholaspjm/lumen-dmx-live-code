<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lumen</title>
    <!-- Inline SVG favicon — a small four-pointed "spark" in the accent
         colour. Drop-in replace this <link> later with a real icon file. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2032%2032'%3E%3Cpath%20fill%3D'%23c4724a'%20d%3D'M16%202%20L18%2014%20L30%2016%20L18%2018%20L16%2030%20L14%2018%20L2%2016%20L14%2014%20Z'%2F%3E%3C%2Fsvg%3E"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #1a1714;
        --surface: #211e1b;
        --border: #2e2a26;
        --text: #e8dfd0;
        --text-muted: #8a8078;
        --accent: #c4724a;
        --accent2: #b8956a;
        --sage: #7a8c6e;
        --error: #c45a5a;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        font-size: 13px;
        overflow: hidden;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Top bar */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        height: 38px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .wordmark {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: var(--accent2);
        text-transform: lowercase;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .wordmark-icon {
        color: var(--accent);
        font-size: 14px;
        line-height: 1;
        /* Placeholder four-pointed spark; replace later with an SVG inline
           or an <img> if you want something more detailed. */
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .bpm-display {
        color: var(--text-muted);
        font-size: 12px;
      }

      .bpm-display span {
        color: var(--text);
      }

      .cycle-bar {
        width: 80px;
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      .cycle-bar-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: none;
      }

      .ws-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .ws-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border);
        transition: background 0.3s;
      }

      .ws-dot.connected {
        background: var(--sage);
      }

      .ws-dot.disconnected {
        background: var(--error);
      }

      /* Editor */
      .editor-wrap {
        flex: 3;
        min-height: 0;
        overflow: hidden;
        position: relative;
      }

      #editor {
        height: 100%;
        overflow: auto;
      }

      /* Divider */
      .divider {
        height: 1px;
        background: var(--border);
        flex-shrink: 0;
      }

      /* Visualizer */
      .viz-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: var(--surface);
      }

      /* Fixture sim panel */
      .fixture-panel {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
      }

      .fixture-label {
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .fixture-lights {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .fixture-unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }

      .fixture-globe {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: var(--bg);
        transition: box-shadow 0.05s, background 0.05s, border-color 0.12s;
        position: relative;
        cursor: help;
      }
      .fixture-globe:hover,
      .fixture-strip:hover {
        border-color: var(--accent2);
      }
      .fixture-strip {
        cursor: help;
      }

      /* Hover tooltip for the fixture sim elements. Positioned absolutely
         by JS near the hovered fixture. Hidden by default; the .open class
         fades it in. Kept deliberately simple — no arrow, just a floating
         card with the fixture's static metadata and live channel values. */
      .fixture-tooltip {
        position: fixed;
        z-index: 200;
        pointer-events: none;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        padding: 9px 12px;
        font-size: 11px;
        min-width: 160px;
        max-width: 300px;
        color: var(--text);
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity 0.1s ease, transform 0.1s ease;
      }
      .fixture-tooltip.open {
        opacity: 1;
        transform: translateY(0);
      }
      .fixture-tooltip .tt-name {
        color: var(--accent2);
        font-weight: 600;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      .fixture-tooltip .tt-meta {
        color: var(--text-muted);
        font-size: 10px;
        margin-top: 2px;
        letter-spacing: 0.04em;
      }
      .fixture-tooltip .tt-divider {
        height: 1px;
        background: var(--border);
        margin: 7px 0;
      }
      .fixture-tooltip .tt-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        font-variant-numeric: tabular-nums;
        line-height: 1.5;
      }
      .fixture-tooltip .tt-row .tt-key {
        color: var(--text-muted);
      }
      .fixture-tooltip .tt-row .tt-val {
        color: var(--text);
      }

      /* Pixel-strip sim — horizontal row of small rectangular "LEDs" */
      .fixture-strip {
        display: flex;
        gap: 2px;
        padding: 3px 4px;
        border: 1.5px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        height: 36px;
        align-items: center;
      }

      .fixture-strip-pixel {
        width: 9px;
        height: 26px;
        border-radius: 1px;
        background: #1a1714;
        transition: background 0.05s, box-shadow 0.05s;
        flex-shrink: 0;
      }

      .fixture-name {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.06em;
      }

      #visualizer {
        display: block;
        width: 100%;
        flex: 1;
        min-height: 0;
      }

      /* Audio transport — tucked above the status bar, deliberately low-key
         so it doesn't compete with the editor + viz. Hidden when no track
         and mic isn't engaged; appears muted otherwise. */
      .audio-bar {
        height: 28px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 0 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        font-size: 11px;
        color: var(--text-muted);
      }
      .audio-bar button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font: inherit;
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 3px;
        cursor: pointer;
        letter-spacing: 0.04em;
      }
      .audio-bar button:hover:not(:disabled) {
        color: var(--text);
        border-color: var(--accent2);
      }
      .audio-bar button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .audio-bar button.active {
        color: var(--accent);
        border-color: var(--accent);
      }
      #audio-info {
        font-variant-numeric: tabular-nums;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 320px;
      }
      .audio-bar .spacer { flex: 1; }

      /* Status bar */
      .statusbar {
        height: 26px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 0 16px;
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }

      #eval-status {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #eval-status.error {
        color: var(--error);
      }

      #eval-status.ok {
        color: var(--sage);
      }

      /* Docs toggle button */
      .docs-toggle {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 3px 10px;
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: lowercase;
        border-radius: 3px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }

      .docs-toggle:hover {
        color: var(--text);
        border-color: var(--accent2);
      }

      .docs-toggle.active {
        color: var(--accent);
        border-color: var(--accent);
      }

      /* Docs panel */
      .docs-panel {
        position: fixed;
        top: 38px;
        right: 0;
        bottom: 0;
        width: 520px;
        max-width: 96vw;
        background: var(--surface);
        border-left: 1px solid var(--border);
        transform: translateX(100%);
        transition: transform 0.22s ease-out;
        z-index: 100;
        display: flex;
        flex-direction: column;
        box-shadow: -8px 0 24px rgba(0, 0, 0, 0.3);
      }

      .docs-panel.open {
        transform: translateX(0);
      }

      .docs-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .docs-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--accent2);
        letter-spacing: 0.08em;
        text-transform: lowercase;
      }

      .docs-close {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
      }

      .docs-close:hover {
        color: var(--text);
      }

      .docs-body {
        flex: 1;
        overflow-y: auto;
        padding: 0 18px 40px;
      }

      /* Search bar — sticky at top of the scrollable body */
      .doc-search {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--surface);
        padding: 12px 0 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .doc-search input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font: inherit;
        font-size: 12px;
        padding: 7px 10px;
        border-radius: 3px;
        outline: none;
        transition: border-color 0.15s;
      }

      .doc-search input::placeholder {
        color: var(--text-muted);
      }

      .doc-search input:focus {
        border-color: var(--accent);
      }

      .doc-search-clear {
        display: none;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1;
        width: 26px;
        height: 26px;
        border-radius: 3px;
        cursor: pointer;
        padding: 0;
      }

      .doc-search-clear:hover {
        color: var(--text);
        border-color: var(--accent2);
      }

      .doc-search-clear.visible {
        display: inline-block;
      }

      .doc-empty {
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        padding: 40px 10px;
        font-style: italic;
      }

      /* Tab strip under the search bar. Strudel-style — tabs are prominent
         and clickable, the scroll slider matches the theme. Scrolls
         horizontally on narrow panels instead of wrapping. */
      .doc-tabs {
        position: sticky;
        top: 50px;
        z-index: 2;
        background: var(--surface);
        display: flex;
        gap: 4px;
        padding: 2px 0 12px;
        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--accent2) transparent;
        border-bottom: 1px solid var(--border);
        margin-bottom: 6px;
      }
      .doc-tabs::-webkit-scrollbar {
        height: 6px;
      }
      .doc-tabs::-webkit-scrollbar-track {
        background: transparent;
        margin: 0 4px;
      }
      .doc-tabs::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
        transition: background 0.15s;
      }
      .doc-tabs::-webkit-scrollbar-thumb:hover {
        background: var(--accent2);
      }

      .doc-tab {
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text-muted);
        font: inherit;
        font-size: 13px;
        padding: 8px 14px;
        border-radius: 0;
        letter-spacing: 0.05em;
        text-transform: lowercase;
        cursor: pointer;
        white-space: nowrap;
        transition: color 0.12s, border-color 0.12s;
      }
      .doc-tab:hover {
        color: var(--text);
      }
      .doc-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* Generic hide utility, used by the docs filter */
      .hidden {
        display: none !important;
      }

      .docs-body::-webkit-scrollbar {
        width: 8px;
      }
      .docs-body::-webkit-scrollbar-track {
        background: var(--surface);
      }
      .docs-body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .doc-section {
        margin-top: 22px;
      }

      .doc-section-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 8px;
        padding-bottom: 5px;
        border-bottom: 1px solid var(--border);
      }

      .doc-blurb {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.55;
        margin-bottom: 12px;
      }

      .doc-entry {
        margin-bottom: 14px;
        padding-bottom: 12px;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.04);
      }

      /* Compact link-row used on the welcome page. Each row is a button
         that switches the docs panel to a target tab on click. Styled to
         feel like a nav-list item — hover tints the bg and shifts the
         arrow to the right. */
      .doc-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 9px 12px;
        margin-bottom: 6px;
        font: inherit;
        text-align: left;
        cursor: pointer;
        color: var(--text);
        transition: border-color 0.12s, background 0.12s;
      }
      .doc-link:hover {
        border-color: var(--accent2);
        background: rgba(196, 114, 74, 0.06);
      }
      .doc-link:hover .doc-link-arrow {
        color: var(--accent);
        transform: translateX(2px);
      }
      .doc-link-label {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .doc-link-arrow {
        color: var(--text-muted);
        font-size: 14px;
        flex-shrink: 0;
        transition: color 0.12s, transform 0.12s;
      }

      .doc-entry:last-child {
        border-bottom: none;
      }

      .doc-sig {
        font-size: 11px;
        margin-bottom: 4px;
        line-height: 1.4;
      }

      .doc-name {
        color: var(--accent2);
        font-weight: 600;
      }

      .doc-signature {
        color: var(--text-muted);
      }

      .doc-desc {
        font-size: 11px;
        color: var(--text);
        line-height: 1.55;
        margin-bottom: 6px;
      }

      .doc-example {
        font-size: 11px;
        color: var(--sage);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 6px 8px;
        margin-top: 4px;
        white-space: pre-wrap;
        font-family: inherit;
      }

      /* ─── Semantic colour coding (lumen-code-highlight extension) ────── */
      /* Commands are every lumen API name — fixture, sine, artnet, setBPM,
         .viz, .flash, .glow, .wave, the audio.* namespace, etc. They wear
         the accent colour so pattern chains are easy to scan. */
      .cm-content .lumen-command {
        color: var(--accent);
      }
      /* Lights are identifiers bound to a fixture via `const X =
         fixture(…) | rgbStrip(…) | rgbwStrip(…)`. They get accent2 with a
         touch of weight so method-chain roots like `wash.red(…)` pop. */
      .cm-content .lumen-light {
        color: var(--accent2);
        font-weight: 600;
      }

      /* ─── Inline editor visualizations (.viz) ─────────────────────────── */
      /* Placed at line-end via CodeMirror WidgetType. They must not take
         part in the text flow's caret positioning, so they're inline-block
         with negative vertical alignment to sit on the baseline cleanly. */
      .lumen-viz {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        margin-left: 12px;
        padding: 2px 5px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: rgba(0, 0, 0, 0.22);
        vertical-align: middle;
        user-select: none;
        cursor: default;
      }

      /* Color swatch */
      .lumen-viz-color {
        width: 30px;
        height: 16px;
        padding: 0;
        border-radius: 2px;
        background: #2e2a26;
        transition: background 0.05s, box-shadow 0.05s;
      }

      /* Meter */
      .lumen-viz-meter {
        width: 8px;
        height: 18px;
        padding: 1px;
        position: relative;
        background: #0f0d0b;
      }
      .lumen-viz-meter-fill {
        position: absolute;
        left: 1px;
        right: 1px;
        bottom: 1px;
        background: linear-gradient(to top, #c4724a, #b8956a);
        border-radius: 1px;
        height: 0%;
        transition: height 0.03s linear;
      }

      /* Wave scope */
      .lumen-viz-wave {
        padding: 1px 2px;
        height: 24px;
      }
      .lumen-viz-wave-canvas {
        display: block;
      }

      /* ─── Pattern-level inline viz (.flash / .glow / .wave) ────────────
         Applied to whole editor lines via Decoration.line. The tick loop
         writes `--lumen-val` (0..1) for .glow and toggles a data attribute
         for .flash; CSS takes it from there. .wave is an end-of-line
         WidgetType canvas and needs nothing here beyond a small padding. */
      .lumen-patviz {
        position: relative;
      }
      /* Glow: subtle rail on the left that fills with the pattern value. */
      .lumen-patviz-glow {
        background: linear-gradient(
          to right,
          rgba(196, 114, 74, calc(var(--lumen-val, 0) * 0.22)) 0%,
          rgba(196, 114, 74, 0) 140px
        );
        transition: background 60ms linear;
      }
      /* Flash: the tick loop maintains a decaying --lumen-flash 0..1 that we
         multiply into the bg alpha. No keyframes, no attribute toggles, no
         forced reflows — the previous animation-restart approach was
         interfering with DMX tick timing enough to flicker physical lights. */
      .lumen-patviz-flash {
        background: rgba(196, 114, 74, calc(var(--lumen-flash, 0) * 0.32));
      }
      /* Wave sparkline widget (inline canvas at end of line). */
      .lumen-patviz-wave {
        display: inline-block;
        margin-left: 10px;
        padding: 1px 3px;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: rgba(0, 0, 0, 0.22);
        vertical-align: middle;
        user-select: none;
      }
      .lumen-patviz-wave canvas {
        display: block;
      }

      /* Pixel strip preview — mini dots */
      .lumen-viz-strip {
        padding: 2px 3px;
        gap: 1px;
      }
      .lumen-viz-strip-dot {
        width: 5px;
        height: 14px;
        border-radius: 1px;
        background: #2e2a26;
        flex-shrink: 0;
        transition: background 0.05s;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <span class="wordmark"><span class="wordmark-icon" aria-hidden="true">✦</span>lumen</span>
        <div class="topbar-right">
          <span class="bpm-display">bpm <span id="bpm-val">120</span></span>
          <div class="cycle-bar" title="cycle position">
            <div class="cycle-bar-fill" id="cycle-fill"></div>
          </div>
          <span class="ws-status">
            <span class="ws-dot disconnected" id="ws-dot"></span>
            <span id="ws-label">disconnected</span>
          </span>
          <button type="button" class="docs-toggle" id="docs-toggle" title="function reference">docs</button>
        </div>
      </header>

      <aside class="docs-panel" id="docs-panel" aria-hidden="true">
        <div class="docs-header">
          <span class="docs-title">reference</span>
          <button type="button" class="docs-close" id="docs-close" title="close">×</button>
        </div>
        <div class="docs-body" id="docs-body"></div>
      </aside>

      <div class="editor-wrap">
        <div id="editor"></div>
      </div>

      <div class="divider"></div>

      <div class="viz-wrap">
        <div class="fixture-panel">
          <span class="fixture-label">sim</span>
          <div class="fixture-lights">
            <div class="fixture-unit">
              <div class="fixture-globe" id="sim-wash"></div>
              <span class="fixture-name">wash</span>
            </div>
            <div class="fixture-unit">
              <div class="fixture-globe" id="sim-strobe"></div>
              <span class="fixture-name">strobe</span>
            </div>
            <div class="fixture-unit">
              <div class="fixture-strip" id="sim-strip"></div>
              <span class="fixture-name">strip</span>
            </div>
            <div class="fixture-unit">
              <div class="fixture-strip" id="sim-bar"></div>
              <span class="fixture-name">bar (u1)</span>
            </div>
          </div>
        </div>
        <canvas id="visualizer"></canvas>
      </div>

      <div class="audio-bar">
        <input type="file" id="audio-file" accept="audio/*" hidden />
        <button type="button" id="audio-load" title="load an audio file">load</button>
        <button type="button" id="audio-play" disabled title="play / pause">▶</button>
        <button type="button" id="audio-mic" title="use microphone as input">mic</button>
        <span id="audio-info">no track</span>
        <span class="spacer"></span>
      </div>

      <div class="statusbar">
        <span id="eval-status">ctrl+enter to run  ·  ctrl+. to stop</span>
      </div>
    </div>

    <div class="fixture-tooltip" id="fixture-tooltip" aria-hidden="true"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
