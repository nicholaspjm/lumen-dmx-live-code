<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lumen</title>
    <!-- Inline SVG favicon — a small four-pointed "spark" in the accent
         colour. Drop-in replace this <link> later with a real icon file. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2032%2032'%3E%3Cpath%20fill%3D'%23c4724a'%20d%3D'M16%202%20L18%2014%20L30%2016%20L18%2018%20L16%2030%20L14%2018%20L2%2016%20L14%2014%20Z'%2F%3E%3C%2Fsvg%3E"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #1a1714;
        --surface: #211e1b;
        --border: #2e2a26;
        --text: #e8dfd0;
        --text-muted: #8a8078;
        --accent: #c4724a;
        --accent2: #b8956a;
        --sage: #7a8c6e;
        --error: #c45a5a;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        font-size: 13px;
        overflow: hidden;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Top bar */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        height: 38px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .wordmark {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: var(--accent2);
        text-transform: lowercase;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .wordmark-icon {
        color: var(--accent);
        font-size: 14px;
        line-height: 1;
        /* Placeholder four-pointed spark; replace later with an SVG inline
           or an <img> if you want something more detailed. */
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .bpm-display {
        color: var(--text-muted);
        font-size: 12px;
      }

      .bpm-display {
        /* Already declared above as .bpm-display — keep the flex layout
           here so tap button sits neatly next to the number. */
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .bpm-display span {
        color: var(--text);
      }

      /* Editable BPM field. Looks like plain text until hovered / focused.
         Pauses its own auto-refresh while focused (see main.ts) so the
         user's in-progress edit isn't stomped by the 10 Hz updater. */
      .bpm-val {
        display: inline-block;
        min-width: 2em;
        padding: 0 3px;
        border-radius: 2px;
        color: var(--text);
        cursor: text;
        outline: none;
        font-variant-numeric: tabular-nums;
      }
      .bpm-val:hover {
        background: rgba(196, 114, 74, 0.08);
      }
      .bpm-val:focus {
        background: rgba(196, 114, 74, 0.15);
        color: var(--accent2);
      }

      /* Tap-tempo button. Flashes briefly on each tap for feedback. */
      .bpm-tap {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font: inherit;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 3px;
        cursor: pointer;
        letter-spacing: 0.08em;
        text-transform: lowercase;
        transition: color 0.1s, border-color 0.1s, background 0.1s;
      }
      .bpm-tap:hover {
        color: var(--text);
        border-color: var(--accent2);
      }
      .bpm-tap.flash {
        color: var(--accent);
        border-color: var(--accent);
        background: rgba(196, 114, 74, 0.18);
      }

      .cycle-bar {
        width: 80px;
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      .cycle-bar-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: none;
      }

      .ws-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .ws-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border);
        transition: background 0.3s;
      }

      .ws-dot.connected {
        background: var(--sage);
      }

      .ws-dot.disconnected {
        background: var(--error);
      }

      /* Editor */
      .editor-wrap {
        flex: 3;
        min-height: 0;
        overflow: hidden;
        position: relative;
      }

      #editor {
        height: 100%;
        overflow: auto;
      }

      /* Divider */
      .divider {
        height: 1px;
        background: var(--border);
        flex-shrink: 0;
      }

      /* Visualizer */
      .viz-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: var(--surface);
      }

      /* Fixture sim panel */
      .fixture-panel {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
      }

      .fixture-label {
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .fixture-lights {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .fixture-unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }

      .fixture-globe {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: var(--bg);
        transition: box-shadow 0.05s, background 0.05s, border-color 0.12s;
        position: relative;
        cursor: help;
      }
      .fixture-globe:hover,
      .fixture-strip:hover {
        border-color: var(--accent2);
      }
      .fixture-strip {
        cursor: help;
      }

      /* Hover tooltip for the fixture sim elements. Positioned absolutely
         by JS near the hovered fixture. Hidden by default; the .open class
         fades it in. Kept deliberately simple — no arrow, just a floating
         card with the fixture's static metadata and live channel values. */
      .fixture-tooltip {
        position: fixed;
        z-index: 200;
        pointer-events: none;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        padding: 9px 12px;
        font-size: 11px;
        min-width: 160px;
        max-width: 300px;
        color: var(--text);
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity 0.1s ease, transform 0.1s ease;
      }
      .fixture-tooltip.open {
        opacity: 1;
        transform: translateY(0);
      }
      .fixture-tooltip .tt-name {
        color: var(--accent2);
        font-weight: 600;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      .fixture-tooltip .tt-meta {
        color: var(--text-muted);
        font-size: 10px;
        margin-top: 2px;
        letter-spacing: 0.04em;
      }
      .fixture-tooltip .tt-divider {
        height: 1px;
        background: var(--border);
        margin: 7px 0;
      }
      .fixture-tooltip .tt-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        font-variant-numeric: tabular-nums;
        line-height: 1.5;
      }
      .fixture-tooltip .tt-row .tt-key {
        color: var(--text-muted);
      }
      .fixture-tooltip .tt-row .tt-val {
        color: var(--text);
      }

      /* Pixel-strip sim — horizontal row of small rectangular "LEDs" */
      .fixture-strip {
        display: flex;
        gap: 2px;
        padding: 3px 4px;
        border: 1.5px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        height: 36px;
        align-items: center;
      }

      .fixture-strip-pixel {
        width: 9px;
        height: 26px;
        border-radius: 1px;
        background: var(--bg);
        transition: background 0.05s, box-shadow 0.05s;
        flex-shrink: 0;
      }

      /* XY indicator — small companion grid that tracks a fixture's
         pan / tilt / direction channels. Sits between the main viz and
         the label. Dot positioned via JS as percentages; the crosshair
         rules are pure decoration. */
      .fixture-xy {
        position: relative;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: var(--bg);
      }
      .fixture-xy-rule {
        position: absolute;
        background: var(--border);
        opacity: 0.6;
      }
      .fixture-xy-rule-h {
        left: 2px; right: 2px;
        top: 50%;
        height: 1px;
      }
      .fixture-xy-rule-v {
        top: 2px; bottom: 2px;
        left: 50%;
        width: 1px;
      }
      .fixture-xy-dot {
        position: absolute;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 4px var(--accent);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        transition: left 80ms linear, top 80ms linear;
        pointer-events: none;
      }

      .fixture-name {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.06em;
      }
      .fixture-empty {
        font-size: 10px;
        color: var(--text-muted);
        font-style: italic;
        letter-spacing: 0.06em;
      }
      .fixture-empty.hidden {
        display: none;
      }

      #visualizer {
        display: block;
        width: 100%;
        flex: 1;
        min-height: 0;
      }

      /* Status bar */
      .statusbar {
        height: 26px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 0 16px;
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }

      #eval-status {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #eval-status.error {
        color: var(--error);
      }

      #eval-status.ok {
        color: var(--sage);
      }

      /* Scene picker — dropdown + new / delete buttons in the top bar.
         Live-performance UX: switch between named code buffers without
         losing edits (each scene autosaves to localStorage). */
      .scene-picker {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .scene-label {
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-right: 2px;
      }
      .scene-select {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        font: inherit;
        font-size: 11px;
        padding: 3px 7px;
        border-radius: 3px;
        max-width: 160px;
        cursor: pointer;
        transition: border-color 0.12s;
      }
      .scene-select:hover,
      .scene-select:focus {
        border-color: var(--accent2);
        outline: none;
      }
      .scene-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font: inherit;
        font-size: 13px;
        padding: 0 6px;
        line-height: 1.6;
        border-radius: 3px;
        cursor: pointer;
        transition: color 0.12s, border-color 0.12s;
      }
      .scene-btn:hover {
        color: var(--text);
        border-color: var(--accent2);
      }
      .scene-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      /* Read-only badge — shown next to the scene controls when the
         active scene is protected (currently just 'default'). Signals
         that edits won't persist until you save-as. */
      .scene-readonly-badge {
        display: inline-block;
        padding: 2px 8px;
        margin-left: 2px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .scene-readonly-badge.hidden {
        display: none;
      }

      /* Docs toggle button */
      .docs-toggle {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 3px 10px;
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: lowercase;
        border-radius: 3px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }

      .docs-toggle:hover {
        color: var(--text);
        border-color: var(--accent2);
      }

      .docs-toggle.active {
        color: var(--accent);
        border-color: var(--accent);
      }

      /* Icon-only variant — the settings gear. Same border + hover treatment
         as the text toggles, but square so the SVG sits centred without
         the lopsided text padding. */
      .settings-toggle-btn {
        padding: 0;
        width: 24px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .settings-toggle-btn svg {
        display: block;
      }

      /* Docs panel */
      .docs-panel {
        position: fixed;
        top: 38px;
        right: 0;
        bottom: 0;
        width: 520px;
        max-width: 96vw;
        background: var(--surface);
        border-left: 1px solid var(--border);
        transform: translateX(100%);
        transition: transform 0.22s ease-out;
        z-index: 100;
        display: flex;
        flex-direction: column;
        box-shadow: -8px 0 24px rgba(0, 0, 0, 0.3);
      }

      .docs-panel.open {
        transform: translateX(0);
      }

      .docs-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .docs-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--accent2);
        letter-spacing: 0.08em;
        text-transform: lowercase;
      }

      .docs-close {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
      }

      .docs-close:hover {
        color: var(--text);
      }

      .docs-body {
        flex: 1;
        overflow-y: auto;
        padding: 0 18px 40px;
      }

      /* Settings panel rows */
      .settings-list {
        padding-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .setting-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .setting-row-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .setting-label {
        font-size: 12px;
        color: var(--text);
        letter-spacing: 0.04em;
      }
      .setting-hint {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }
      .setting-select {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font: inherit;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 3px;
        outline: none;
        cursor: pointer;
        min-width: 170px;
      }
      .setting-select:focus {
        border-color: var(--accent2);
      }
      /* iOS-style toggle */
      .setting-toggle {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
        cursor: pointer;
      }
      .setting-toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .setting-toggle-thumb {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 10px;
        transition: background 0.15s;
      }
      .setting-toggle-thumb::before {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        background: var(--text-muted);
        border-radius: 50%;
        transition: transform 0.15s, background 0.15s;
      }
      .setting-toggle input:checked + .setting-toggle-thumb {
        background: var(--accent);
      }
      .setting-toggle input:checked + .setting-toggle-thumb::before {
        transform: translateX(16px);
        background: var(--bg);
      }
      .settings-footer {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
      .settings-reset {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 6px 12px;
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: lowercase;
        border-radius: 3px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }
      .settings-reset:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      /* Search bar — sticky at top of the scrollable body */
      .doc-search {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--surface);
        padding: 12px 0 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .doc-search input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font: inherit;
        font-size: 12px;
        padding: 7px 10px;
        border-radius: 3px;
        outline: none;
        transition: border-color 0.15s;
      }

      .doc-search input::placeholder {
        color: var(--text-muted);
      }

      .doc-search input:focus {
        border-color: var(--accent);
      }

      .doc-search-clear {
        display: none;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1;
        width: 26px;
        height: 26px;
        border-radius: 3px;
        cursor: pointer;
        padding: 0;
      }

      .doc-search-clear:hover {
        color: var(--text);
        border-color: var(--accent2);
      }

      .doc-search-clear.visible {
        display: inline-block;
      }

      .doc-empty {
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        padding: 40px 10px;
        font-style: italic;
      }

      /* Tab strip under the search bar. Strudel-style — tabs are prominent
         and clickable, the scroll slider matches the theme. Scrolls
         horizontally on narrow panels instead of wrapping. */
      .doc-tabs {
        position: sticky;
        top: 50px;
        z-index: 2;
        background: var(--surface);
        display: flex;
        gap: 4px;
        padding: 2px 0 12px;
        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--accent2) transparent;
        border-bottom: 1px solid var(--border);
        margin-bottom: 6px;
      }
      .doc-tabs::-webkit-scrollbar {
        height: 6px;
      }
      .doc-tabs::-webkit-scrollbar-track {
        background: transparent;
        margin: 0 4px;
      }
      .doc-tabs::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
        transition: background 0.15s;
      }
      .doc-tabs::-webkit-scrollbar-thumb:hover {
        background: var(--accent2);
      }

      .doc-tab {
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text-muted);
        font: inherit;
        font-size: 13px;
        padding: 8px 14px;
        border-radius: 0;
        letter-spacing: 0.05em;
        text-transform: lowercase;
        cursor: pointer;
        white-space: nowrap;
        transition: color 0.12s, border-color 0.12s;
      }
      .doc-tab:hover {
        color: var(--text);
      }
      .doc-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* Flat ranked search results (hidden unless the search box has content).
         Results carry a small tag on the right showing which section they
         came from, so the user knows where to go for the full context. */
      .doc-results {
        padding-top: 12px;
      }
      .doc-result {
        /* Slightly more breathing room than in-section entries, since the
           section heading isn't adjacent to guide the eye. */
        margin-bottom: 12px;
      }
      .doc-section-tag {
        display: inline-block;
        margin-left: auto;
        padding: 2px 8px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .doc-result .doc-sig {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      /* Generic hide utility, used by the docs filter */
      .hidden {
        display: none !important;
      }

      .docs-body::-webkit-scrollbar {
        width: 8px;
      }
      .docs-body::-webkit-scrollbar-track {
        background: var(--surface);
      }
      .docs-body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .doc-section {
        margin-top: 22px;
      }

      .doc-section-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 8px;
        padding-bottom: 5px;
        border-bottom: 1px solid var(--border);
      }

      .doc-blurb {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.55;
        margin-bottom: 12px;
      }

      .doc-entry {
        margin-bottom: 14px;
        padding-bottom: 12px;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.04);
      }

      /* Compact link-row used on the welcome page. Each row is a button
         that switches the docs panel to a target tab on click. Styled to
         feel like a nav-list item — hover tints the bg and shifts the
         arrow to the right. */
      .doc-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 9px 12px;
        margin-bottom: 6px;
        font: inherit;
        text-align: left;
        cursor: pointer;
        color: var(--text);
        transition: border-color 0.12s, background 0.12s;
      }
      .doc-link:hover {
        border-color: var(--accent2);
        background: rgba(196, 114, 74, 0.06);
      }
      .doc-link:hover .doc-link-arrow {
        color: var(--accent);
        transform: translateX(2px);
      }
      .doc-link-label {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .doc-link-arrow {
        color: var(--text-muted);
        font-size: 14px;
        flex-shrink: 0;
        transition: color 0.12s, transform 0.12s;
      }

      .doc-entry:last-child {
        border-bottom: none;
      }

      .doc-sig {
        font-size: 11px;
        margin-bottom: 4px;
        line-height: 1.4;
      }

      .doc-name {
        color: var(--accent2);
        font-weight: 600;
      }

      .doc-signature {
        color: var(--text-muted);
      }

      .doc-desc {
        font-size: 11px;
        color: var(--text);
        line-height: 1.55;
        margin-bottom: 6px;
      }

      .doc-example {
        font-size: 11px;
        color: var(--sage);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 6px 8px;
        margin-top: 4px;
        white-space: pre-wrap;
        font-family: inherit;
      }

      /* ─── Fixture library panel ────────────────────────────────────────
         Lives in its own .docs-panel instance with a distinct id, reusing
         the slide-in layout / scrollbar / sticky header styling from the
         docs panel. Library-specific rows, buttons and banner live here. */
      .lib-toolbar {
        display: flex;
        gap: 8px;
        padding: 12px 0 8px;
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--surface);
      }
      .lib-action {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font: inherit;
        font-size: 11px;
        padding: 5px 11px;
        border-radius: 3px;
        cursor: pointer;
        letter-spacing: 0.04em;
        text-transform: lowercase;
        transition: color 0.1s, border-color 0.1s, background 0.1s;
      }
      .lib-action:hover {
        color: var(--text);
        border-color: var(--accent2);
      }
      .lib-action.lib-primary {
        color: var(--accent);
        border-color: var(--accent);
      }
      .lib-action.lib-primary:hover {
        background: rgba(196, 114, 74, 0.12);
      }
      .lib-action.lib-danger:hover {
        color: var(--error);
        border-color: var(--error);
      }

      .lib-banner {
        padding: 0 10px;
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.15s ease, padding 0.15s ease;
        font-size: 11px;
        border-left: 2px solid var(--accent);
        color: var(--text-muted);
      }
      .lib-banner.visible {
        max-height: 40px;
        padding: 8px 10px;
        margin: 4px 0 8px;
      }
      .lib-banner-error {
        border-left-color: var(--error);
        color: var(--error);
      }

      .lib-heading {
        font-size: 10px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin: 18px 0 8px;
        padding-bottom: 5px;
        border-bottom: 1px solid var(--border);
      }
      .lib-empty {
        font-size: 11px;
        color: var(--text-muted);
        font-style: italic;
        padding: 12px 4px;
      }
      /* Small explanatory paragraph under each section heading so the
         tiers (public vs pinned vs session) read as distinct. */
      .lib-note {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.45;
        margin: -4px 0 10px;
      }
      /* Pill next to a public fixture's name so it's obvious it's not
         user-local state. */
      .lib-row-tag {
        display: inline-block;
        padding: 1px 7px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent2);
        vertical-align: middle;
      }

      .lib-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        padding: 10px 0;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.04);
      }
      .lib-row:last-child {
        border-bottom: none;
      }
      .lib-row-unsaved {
        opacity: 0.85;
      }
      .lib-row-meta {
        min-width: 0;
        flex: 1;
      }
      .lib-row-title {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: baseline;
        font-size: 12px;
      }
      .lib-row-id {
        color: var(--accent2);
        font-weight: 600;
      }
      .lib-row-name {
        color: var(--text);
      }
      .lib-row-sub {
        color: var(--text-muted);
        font-size: 11px;
        margin-top: 3px;
      }
      .lib-row-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      /* ─── Autocomplete popup (@codemirror/autocomplete) ────────────────
         CM6 ships reasonable defaults but they're light-mode. Override
         colors + borders to sit in the lumen dark theme. */
      .cm-tooltip.cm-tooltip-autocomplete {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        font: inherit;
        font-size: 12px;
      }
      .cm-tooltip.cm-tooltip-autocomplete > ul {
        font-family: inherit;
      }
      .cm-tooltip.cm-tooltip-autocomplete > ul > li {
        padding: 3px 10px;
      }
      .cm-tooltip.cm-tooltip-autocomplete > ul > li[aria-selected] {
        background: rgba(196, 114, 74, 0.18);
        color: var(--accent);
      }
      .cm-tooltip-autocomplete .cm-completionLabel {
        color: var(--text);
      }
      .cm-tooltip-autocomplete [aria-selected] .cm-completionLabel {
        color: var(--accent);
      }
      .cm-tooltip-autocomplete .cm-completionMatchedText {
        color: var(--accent2);
        text-decoration: none;
        font-weight: 600;
      }
      .cm-tooltip-autocomplete .cm-completionDetail {
        color: var(--text-muted);
        font-style: normal;
        font-size: 11px;
        margin-left: 8px;
      }
      /* Info panel that opens to the right of the popup when an item has
         extra info text. */
      .cm-tooltip.cm-completionInfo {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text);
        padding: 8px 12px;
        font-size: 11px;
        line-height: 1.55;
        max-width: 280px;
      }

      /* ─── Semantic colour coding (lumen-code-highlight extension) ────── */
      /* Commands are every lumen API name — fixture, sine, artnet, setBPM,
         .viz, .flash, .glow, .wave, the audio.* namespace, etc. They wear
         the accent colour so pattern chains are easy to scan. */
      .cm-content .lumen-command {
        color: var(--accent);
      }
      /* Lights are identifiers bound to a fixture via `const X =
         fixture(…) | rgbStrip(…) | rgbwStrip(…)`. They get accent2 with a
         touch of weight so method-chain roots like `wash.red(…)` pop. */
      .cm-content .lumen-light {
        color: var(--accent2);
        font-weight: 600;
      }

      /* ─── Inline editor visualizations (.viz) ─────────────────────────── */
      /* Placed at line-end via CodeMirror WidgetType. They must not take
         part in the text flow's caret positioning, so they're inline-block
         with negative vertical alignment to sit on the baseline cleanly. */
      .lumen-viz {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        margin-left: 12px;
        padding: 2px 5px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: rgba(0, 0, 0, 0.22);
        vertical-align: middle;
        user-select: none;
        cursor: default;
      }

      /* Color swatch */
      .lumen-viz-color {
        width: 30px;
        height: 16px;
        padding: 0;
        border-radius: 2px;
        background: #2e2a26;
        transition: background 0.05s, box-shadow 0.05s;
      }

      /* Meter */
      .lumen-viz-meter {
        width: 8px;
        height: 18px;
        padding: 1px;
        position: relative;
        background: #0f0d0b;
      }
      .lumen-viz-meter-fill {
        position: absolute;
        left: 1px;
        right: 1px;
        bottom: 1px;
        background: linear-gradient(to top, #c4724a, #b8956a);
        border-radius: 1px;
        height: 0%;
        transition: height 0.03s linear;
      }

      /* Wave scope */
      .lumen-viz-wave {
        padding: 1px 2px;
        height: 24px;
      }
      .lumen-viz-wave-canvas {
        display: block;
      }

      /* ─── Pattern-level inline viz (.flash / .glow / .wave) ────────────
         Applied to whole editor lines via Decoration.line. The tick loop
         writes `--lumen-val` (0..1) for .glow and toggles a data attribute
         for .flash; CSS takes it from there. .wave is an end-of-line
         WidgetType canvas and needs nothing here beyond a small padding. */
      .lumen-patviz {
        position: relative;
      }
      /* Glow: subtle rail on the left that fills with the pattern value. */
      .lumen-patviz-glow {
        background: linear-gradient(
          to right,
          rgba(196, 114, 74, calc(var(--lumen-val, 0) * 0.22)) 0%,
          rgba(196, 114, 74, 0) 140px
        );
        transition: background 60ms linear;
      }
      /* Flash: the tick loop maintains a decaying --lumen-flash 0..1 that we
         multiply into the bg alpha. No keyframes, no attribute toggles, no
         forced reflows — the previous animation-restart approach was
         interfering with DMX tick timing enough to flicker physical lights. */
      .lumen-patviz-flash {
        background: rgba(196, 114, 74, calc(var(--lumen-flash, 0) * 0.32));
      }
      /* Wave sparkline widget (inline canvas at end of line). */
      .lumen-patviz-wave {
        display: inline-block;
        margin-left: 10px;
        padding: 1px 3px;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: rgba(0, 0, 0, 0.22);
        vertical-align: middle;
        user-select: none;
      }
      .lumen-patviz-wave canvas {
        display: block;
      }

      /* Pixel strip preview — mini dots */
      .lumen-viz-strip {
        padding: 2px 3px;
        gap: 1px;
      }
      .lumen-viz-strip-dot {
        width: 5px;
        height: 14px;
        border-radius: 1px;
        background: #2e2a26;
        flex-shrink: 0;
        transition: background 0.05s;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <span class="wordmark"><span class="wordmark-icon" aria-hidden="true">✦</span>lumen</span>
        <div class="topbar-right">
          <span class="bpm-display">
            bpm
            <!-- contenteditable instead of <input> so it inherits the top-bar
                 typography without fighting input-element defaults. -->
            <span
              id="bpm-val"
              class="bpm-val"
              contenteditable="plaintext-only"
              spellcheck="false"
              inputmode="numeric"
              title="click to edit · double-click to select"
              role="spinbutton"
              aria-valuemin="1"
              aria-valuemax="400"
            >120</span>
            <button type="button" id="bpm-tap" class="bpm-tap" title="tap tempo (T)">tap</button>
          </span>
          <div class="cycle-bar" title="cycle position">
            <div class="cycle-bar-fill" id="cycle-fill"></div>
          </div>
          <span class="ws-status">
            <span class="ws-dot disconnected" id="ws-dot"></span>
            <span id="ws-label">disconnected</span>
          </span>
          <div class="scene-picker">
            <label for="scene-select" class="scene-label">scene</label>
            <select id="scene-select" class="scene-select" title="switch scene"></select>
            <button type="button" class="scene-btn" id="scene-new" title="new scene">+</button>
            <button type="button" class="scene-btn" id="scene-reset" title="reset current scene to its built-in template (only works on bundled seed scenes)">↺</button>
            <button type="button" class="scene-btn" id="scene-delete" title="delete current scene">×</button>
            <span id="scene-readonly-badge" class="scene-readonly-badge hidden" title="This scene is read-only. Ctrl+S saves your edits as a new scene.">read-only</span>
          </div>
          <button type="button" class="docs-toggle" id="library-toggle" title="custom fixture library">library</button>
          <button type="button" class="docs-toggle" id="docs-toggle" title="function reference">docs</button>
          <button type="button" class="docs-toggle settings-toggle-btn" id="settings-toggle" title="settings" aria-label="settings">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>
      </header>

      <aside class="docs-panel" id="docs-panel" aria-hidden="true">
        <div class="docs-header">
          <span class="docs-title">reference</span>
          <button type="button" class="docs-close" id="docs-close" title="close">×</button>
        </div>
        <div class="docs-body" id="docs-body"></div>
      </aside>

      <aside class="docs-panel" id="library-panel" aria-hidden="true">
        <div class="docs-header">
          <span class="docs-title">library</span>
          <button type="button" class="docs-close" id="library-close" title="close">×</button>
        </div>
        <div class="docs-body" id="library-body"></div>
      </aside>

      <aside class="docs-panel" id="settings-panel" aria-hidden="true">
        <div class="docs-header">
          <span class="docs-title">settings</span>
          <button type="button" class="docs-close" id="settings-close" title="close">×</button>
        </div>
        <div class="docs-body" id="settings-body"></div>
      </aside>

      <div class="editor-wrap">
        <div id="editor"></div>
      </div>

      <div class="divider"></div>

      <div class="viz-wrap">
        <div class="fixture-panel">
          <span class="fixture-label">sim</span>
          <!-- Sim panel is rebuilt dynamically in main.ts after every eval —
               one fixture-unit element per SimFixture the current scene
               registered with the core. Empty when nothing is defined. -->
          <div class="fixture-lights" id="fixture-lights"></div>
          <span class="fixture-empty" id="fixture-empty">no fixtures in this scene</span>
        </div>
        <canvas id="visualizer"></canvas>
      </div>

      <div class="statusbar">
        <span id="eval-status">ctrl+enter to run  ·  ctrl+. to stop</span>
      </div>
    </div>

    <div class="fixture-tooltip" id="fixture-tooltip" aria-hidden="true"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
